asyncapi: 3.0.0
info:
  title: "Arcadia Editions - Fulfillment Shipping"
  version: 0.0.1
  tags:
    - name: "Default"
    - name: "FulfillmentShipping"

defaultContentType: application/json

channels:
  OrderConfirmedEventsChannel:
    address: "orders-checkout.events.order-confirmed"
    messages:
      ScheduleFulfillmentInputMessage:
        $ref: '#/components/messages/ScheduleFulfillmentInputMessage'
  FulfillmentScheduledEventsChannel:
    address: "fulfillment-shipping.events.fulfillment-scheduled"
    messages:
      FulfillmentScheduledMessage:
        $ref: '#/components/messages/FulfillmentScheduledMessage'
  FulfillmentFailedEventsChannel:
    address: "fulfillment-shipping.events.fulfillment-failed"
    messages:
      FulfillmentFailedMessage:
        $ref: '#/components/messages/FulfillmentFailedMessage'
  FulfillmentReadyToShipEventsChannel:
    address: "fulfillment-shipping.events.fulfillment-ready-to-ship"
    messages:
      FulfillmentReadyToShipMessage:
        $ref: '#/components/messages/FulfillmentReadyToShipMessage'

operations:
  doScheduleFulfillment:
    action: receive
    tags:
      - name: FulfillmentShipping
    channel:
      $ref: '#/channels/OrderConfirmedEventsChannel'
  onFulfillmentScheduled:
    action: send
    tags:
      - name: FulfillmentShipping
    channel:
      $ref: '#/channels/FulfillmentScheduledEventsChannel'
  onFulfillmentFailed:
    action: send
    tags:
      - name: FulfillmentShipping
    channel:
      $ref: '#/channels/FulfillmentFailedEventsChannel'
  onFulfillmentReadyToShip:
    action: send
    tags:
      - name: FulfillmentShipping
    channel:
      $ref: '#/channels/FulfillmentReadyToShipEventsChannel'


components:
  messages:
    ScheduleFulfillmentInputMessage:
      name: ScheduleFulfillmentInputMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/ScheduleFulfillmentInput.avsc"
    FulfillmentScheduledMessage:
      name: FulfillmentScheduledMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/FulfillmentScheduled.avsc"
    FulfillmentFailedMessage:
      name: FulfillmentFailedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/FulfillmentFailed.avsc"
    FulfillmentReadyToShipMessage:
      name: FulfillmentReadyToShipMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/FulfillmentReadyToShip.avsc"

  messageTraits:
    CommonHeaders:
      headers:
        type: object
        properties:
          kafka_messageKey:
            type: "integer"
            format: "int64"
            description: This header value will be populated automatically at runtime
            x-runtime-expression: $message.payload#/id
          # CloudEvents Attributes
          ce-id:
            type: string
            description: Unique identifier for the event
            x-runtime-expression: $message.payload#{#this.id}
          ce-source:
            type: string
            description: URI identifying the context where event happened
            x-runtime-expression: $message.payload#{"FulfillmentShipping"}
          ce-specversion:
            type: string
            description: CloudEvents specification version
            x-runtime-expression: $message.payload#{"1.0"}
          ce-type:
            type: string
            description: Event type
            x-runtime-expression: $message.payload#{#this.getClass().getSimpleName()}
          ce-time:
            type: string
            description: Timestamp of when the event happened
            x-runtime-expression: $message.payload#{T(java.time.Instant).now().toString()}


