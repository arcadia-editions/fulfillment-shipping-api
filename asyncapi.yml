asyncapi: 3.1.0
id: urn:com.arcadiaeditions:fulfillment:shipping:asyncapi

info:
  title: Arcadia Editions - Fulfillment Shipping
  version: 0.0.1
  tags:
  - name: Default
  - name: FulfillmentShipping

servers:
  develop:
    $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-master.yml#/servers/develop

x-application-bindings:
  x-principal: fulfillment_shipping
  x-clientId: fulfillment_shipping
  x-groupId: fulfillment_shipping

defaultContentType: application/json

channels:
  fulfillment-scheduled-event-v1:
    address: fulfillment-shipping.fulfillment-scheduled.event.avro.v1
    messages:
      FulfillmentScheduledMessage:
        $ref: "#/components/messages/FulfillmentScheduledMessage"
    x-traits:
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicS
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicRetained
  fulfillment-failed-event-v1:
    address: fulfillment-shipping.fulfillment-failed.event.avro.v1
    messages:
      FulfillmentFailedMessage:
        $ref: "#/components/messages/FulfillmentFailedMessage"
    x-traits:
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicS
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicRetained
  fulfillment-ready-to-ship-event-v1:
    address: fulfillment-shipping.fulfillment-ready-to-ship.event.avro.v1
    messages:
      FulfillmentReadyToShipMessage:
        $ref: "#/components/messages/FulfillmentReadyToShipMessage"
    x-traits:
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicS
    - $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-channel-traits.yml#/components/channelTraits/kafkaTopicRetained

operations:
  onFulfillmentScheduled:
    action: send
    tags:
    - name: FulfillmentShipping
    channel:
      $ref: "#/channels/fulfillment-scheduled-event-v1"
    traits:
    - $ref: "#/components/operationTraits/clientIdAndPrincipal"
  onFulfillmentFailed:
    action: send
    tags:
    - name: FulfillmentShipping
    channel:
      $ref: "#/channels/fulfillment-failed-event-v1"
    traits:
    - $ref: "#/components/operationTraits/clientIdAndPrincipal"
  onFulfillmentReadyToShip:
    action: send
    tags:
    - name: FulfillmentShipping
    channel:
      $ref: "#/channels/fulfillment-ready-to-ship-event-v1"
    traits:
    - $ref: "#/components/operationTraits/clientIdAndPrincipal"

components:
  messages:
    FulfillmentScheduledMessage:
      name: FulfillmentScheduledMessage
      title: ""
      summary: ""
      traits:
      - $ref: "#/components/messageTraits/CommonHeaders"
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: avro/FulfillmentScheduled.avsc
    FulfillmentFailedMessage:
      name: FulfillmentFailedMessage
      title: ""
      summary: ""
      traits:
      - $ref: "#/components/messageTraits/CommonHeaders"
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: avro/FulfillmentFailed.avsc
    FulfillmentReadyToShipMessage:
      name: FulfillmentReadyToShipMessage
      title: ""
      summary: ""
      traits:
      - $ref: "#/components/messageTraits/CommonHeaders"
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: avro/FulfillmentReadyToShip.avsc
  messageTraits:
    CommonHeaders:
      $ref: https://raw.githubusercontent.com/arcadia-editions/api-contract-commons/refs/heads/main/asyncapi-message-traits.yml#/components/messageTraits/CommonHeaders
  operationTraits:
    clientIdAndPrincipal:
      bindings:
        kafka:
          x-principal:
            $ref: "#/x-application-bindings/x-principal"
          x-groupId:
            $ref: "#/x-application-bindings/x-groupId"
